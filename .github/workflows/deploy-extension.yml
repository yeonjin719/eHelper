name: Deploy Extension

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Archive dist
        run: cd dist && zip -r ../extension.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    # 승인 전까지 배포 비활성화:
    # repo variable `CWS_PUBLISH_ENABLED`를 true로 바꾸기 전에는 실행되지 않음.
    if: startsWith(github.ref, 'refs/tags/v') && vars.CWS_PUBLISH_ENABLED == 'true'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: .

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get OAuth access token
        id: token
        run: |
          ACCESS_TOKEN=$(curl -s https://oauth2.googleapis.com/token \
            -d client_id="${{ secrets.CWS_CLIENT_ID }}" \
            -d client_secret="${{ secrets.CWS_CLIENT_SECRET }}" \
            -d refresh_token="${{ secrets.CWS_REFRESH_TOKEN }}" \
            -d grant_type=refresh_token | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to get access token"
            exit 1
          fi
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload to Chrome Web Store
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Type: application/zip" \
            --data-binary "@extension.zip" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}"

      - name: Publish to Chrome Web Store
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}/publish?publishTarget=default"
